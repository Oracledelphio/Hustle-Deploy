[build]
  command = "pnpm --filter @workspace/hustlesafe build"
  publish = "artifacts/hustlesafe/dist/public"
  functions = "artifacts/api-server/src"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
