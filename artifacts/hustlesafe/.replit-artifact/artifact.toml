kind = "web"
previewPath = "/"
title = "HustleSafe"
version = "1.0.0"
id = "artifacts/hustlesafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22470

[services.development]
run = "pnpm --filter @workspace/hustlesafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hustlesafe", "run", "build" ]
publicDir = "artifacts/hustlesafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22470"
BASE_PATH = "/"
